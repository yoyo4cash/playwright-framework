name: Playwright Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  # schedule:
  #   - cron: '0 2 * * *' # every day at 2am'

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # don’t stop if one browser fails
      matrix:
        browser: [chromium, firefox] # [chromium, firefox, webkit]

    steps:
    - name: Checkout repo
      uses: actions/checkout@v6

    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright tests (${{ matrix.browser }})
      run: npx playwright test tests/example.spec.ts --project=${{ matrix.browser }}
      # run: npx playwright test tests/example.spec.ts
      # run: npx playwright test

    # Upload report unless job was cancelled (e.g. due to a newer commit)
    - name: Upload Playwright HTML Report
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ matrix.browser }}
        path: playwright-report/
        retention-days: 30
    
    # # Upload screenshots/videos only if tests failed (or partially ran)
